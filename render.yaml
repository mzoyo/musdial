databases:
  - name: musdial-db
    plan: free
    databaseName: musdial
    user: musdial

services:
  - type: web
    name: musdial
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py createsuperuser --noinput || true && python manage.py cargar_torneo || true
    startCommand: gunicorn config.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: musdial-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://musdial.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.2"
