<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Musdial{% endblock %}</title>
    <meta name="description" content="Torneo de mus - Musdial">
    <meta property="og:title" content="Musdial - Torneo de Mus">
    <meta property="og:description" content="{% block og_description %}Sigue el torneo de mus en directo{% endblock %}">
    <meta property="og:type" content="website">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', system-ui, sans-serif; }

        /* Botón deshabilitado genérico */
        .btn[disabled], .btn:disabled {
            opacity: 0.3 !important;
            cursor: not-allowed !important;
            pointer-events: none !important;
        }

        /* Colores optimizados para cada tema */
        [data-theme="forest"] .score-win { color: #4ade80; }
        [data-theme="forest"] .score-lose { color: #f87171; }
        [data-theme="forest"] .score-muted { color: rgba(255,255,255,0.35); }
        [data-theme="forest"] .game-row-win { background: rgba(74,222,128,0.15); }
        [data-theme="forest"] .game-row-lose { background: rgba(248,113,113,0.15); }
        [data-theme="forest"] .game-label-win { color: #4ade80; }
        [data-theme="forest"] .game-label-lose { color: #f87171; }
        [data-theme="forest"] .status-waiting { color: #fbbf24; }
        [data-theme="forest"] .status-waiting-bg { border-color: rgba(251,191,36,0.4); }
        [data-theme="forest"] .confirm-score-win { color: #4ade80; }
        [data-theme="forest"] .confirm-score-muted { color: rgba(255,255,255,0.35); }
        [data-theme="forest"] .btn-resultado-win { color: #4ade80; border-color: #4ade80; }
        [data-theme="forest"] .btn-resultado-win:hover { color: #4ade80; border-color: #4ade80; background: rgba(74,222,128,0.15); }
        [data-theme="forest"] .btn-resultado-win.activo { background: #4ade80; color: #1a1a2e; border-color: #4ade80; }
        [data-theme="forest"] .btn-resultado-win.activo:hover { background: #4ade80; color: #1a1a2e; }
        [data-theme="forest"] .btn-resultado-lose { color: #f87171; border-color: #f87171; }
        [data-theme="forest"] .btn-resultado-lose:hover { color: #f87171; border-color: #f87171; background: rgba(248,113,113,0.15); }
        [data-theme="forest"] .btn-resultado-lose.activo { background: #f87171; color: #1a1a2e; border-color: #f87171; }
        [data-theme="forest"] .btn-resultado-lose.activo:hover { background: #f87171; color: #1a1a2e; }

        [data-theme="lemonade"] .score-win { color: #4d7c0f; }
        [data-theme="lemonade"] .score-lose { color: #b91c1c; }
        [data-theme="lemonade"] .score-muted { color: rgba(0,0,0,0.25); }
        [data-theme="lemonade"] .game-row-win { background: rgba(77,124,15,0.12); }
        [data-theme="lemonade"] .game-row-lose { background: rgba(185,28,28,0.1); }
        [data-theme="lemonade"] .game-label-win { color: #4d7c0f; }
        [data-theme="lemonade"] .game-label-lose { color: #b91c1c; }
        [data-theme="lemonade"] .status-waiting { color: #a16207; }
        [data-theme="lemonade"] .status-waiting-bg { border-color: #a16207; }
        [data-theme="lemonade"] .confirm-score-win { color: #4d7c0f; }
        [data-theme="lemonade"] .confirm-score-muted { color: rgba(0,0,0,0.25); }
        [data-theme="lemonade"] .btn-resultado-win { color: #4d7c0f; border-color: #4d7c0f; }
        [data-theme="lemonade"] .btn-resultado-win:hover { color: #4d7c0f; border-color: #4d7c0f; background: rgba(77,124,15,0.1); }
        [data-theme="lemonade"] .btn-resultado-win.activo { background: #4d7c0f; color: #fff; border-color: #4d7c0f; }
        [data-theme="lemonade"] .btn-resultado-win.activo:hover { background: #4d7c0f; color: #fff; }
        [data-theme="lemonade"] .btn-resultado-lose { color: #b91c1c; border-color: #b91c1c; }
        [data-theme="lemonade"] .btn-resultado-lose:hover { color: #b91c1c; border-color: #b91c1c; background: rgba(185,28,28,0.08); }
        [data-theme="lemonade"] .btn-resultado-lose.activo { background: #b91c1c; color: #fff; border-color: #b91c1c; }
        [data-theme="lemonade"] .btn-resultado-lose.activo:hover { background: #b91c1c; color: #fff; }
    </style>
    <script>
        (function() {
            var saved = localStorage.getItem('musdial-theme');
            var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'forest' : 'lemonade');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body class="min-h-screen bg-base-200">
    <header class="navbar bg-base-300 shadow-lg px-4">
        <div class="max-w-2xl mx-auto w-full flex items-center justify-between">
            <a href="{% url 'inicio' %}" class="text-2xl font-bold tracking-tight text-primary">
                MUSDIAL
            </a>
            <nav class="flex gap-1 items-center">
                <a href="{% url 'clasificacion' %}" class="btn btn-ghost btn-sm">Clasificacion</a>
                <button onclick="toggleTheme()" class="btn btn-ghost btn-sm btn-square" aria-label="Cambiar tema">
                    <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <svg id="icon-moon" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-6 pb-20">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-base-content/40 text-xs py-6 border-t border-base-300">
        Musdial &copy; 2026
    </footer>

    <script>
        function updateIcons() {
            var theme = document.documentElement.getAttribute('data-theme');
            document.getElementById('icon-sun').classList.toggle('hidden', theme !== 'forest');
            document.getElementById('icon-moon').classList.toggle('hidden', theme !== 'lemonade');
        }
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'forest' ? 'lemonade' : 'forest';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('musdial-theme', next);
            updateIcons();
        }
        updateIcons();
    </script>
</body>
</html>
