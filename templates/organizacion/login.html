<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Musdial Organizacion</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', system-ui, sans-serif; }
    </style>
    <script>
        (function() {
            var saved = localStorage.getItem('musdial-theme');
            var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'forest' : 'lemonade');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center">
    <div class="w-full max-w-sm mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-primary mt-3">MUSDIAL</h1>
            <p class="text-base-content/50 text-sm mt-1">Panel de organizacion</p>
        </div>

        <div class="card bg-base-100 shadow-xl">
            <div class="card-body">
                {% if form.errors %}
                <div class="alert alert-error mb-4">
                    <span>Usuario o contrasenya incorrectos</span>
                </div>
                {% endif %}

                <form method="post" class="space-y-4">
                    {% csrf_token %}
                    <div class="form-control">
                        <label class="label"><span class="label-text text-xs uppercase tracking-wider">Usuario</span></label>
                        <input type="text" name="username" required autofocus class="input input-bordered" placeholder="Usuario">
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text text-xs uppercase tracking-wider">Contrasenya</span></label>
                        <input type="password" name="password" required class="input input-bordered" placeholder="Contrasenya">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Entrar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
