<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Musdial Organizacion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen flex items-center justify-center font-['Inter',system-ui,sans-serif]">
    <div class="w-full max-w-sm mx-4">
        <div class="text-center mb-8">
            <span class="text-5xl">&#127183;</span>
            <h1 class="text-3xl font-black text-white mt-3">MUSDIAL</h1>
            <p class="text-gray-400 text-sm mt-1">Panel de organizacion</p>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl p-8">
            {% if form.errors %}
            <div class="bg-red-50 border border-red-200 rounded-2xl p-4 mb-6 text-center">
                <p class="text-red-600 font-bold text-sm">Usuario o contrasenya incorrectos</p>
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Usuario</label>
                    <input type="text" name="username" required autofocus
                           class="w-full px-4 py-3.5 border-2 border-gray-200 rounded-2xl text-sm font-medium focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Contrasenya</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3.5 border-2 border-gray-200 rounded-2xl text-sm font-medium focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none transition-all">
                </div>
                <button type="submit"
                        class="w-full bg-gradient-to-b from-emerald-500 to-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-500/25 hover:from-emerald-400 hover:to-emerald-500 transition-all active:scale-95">
                    Entrar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
