<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Organizacion{% endblock %} - Musdial</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', system-ui, sans-serif; }

        [data-theme="forest"] .score-win { color: #4ade80; }
        [data-theme="forest"] .score-lose { color: #f87171; }
        [data-theme="forest"] .status-waiting { color: #fbbf24; }
        [data-theme="lemonade"] .score-win { color: #4d7c0f; }
        [data-theme="lemonade"] .score-lose { color: #b91c1c; }
        [data-theme="lemonade"] .status-waiting { color: #a16207; }
    </style>
    <script>
        (function() {
            var saved = localStorage.getItem('musdial-theme');
            var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'forest' : 'lemonade');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body class="min-h-screen bg-base-200">
    <header class="navbar bg-base-300 shadow-lg px-4">
        <div class="max-w-5xl mx-auto w-full">
            <div class="flex items-center justify-between w-full">
                <div class="flex items-center gap-3">
                    <a href="{% url 'org_dashboard' %}" class="text-lg font-bold tracking-tight text-primary">MUSDIAL</a>
                    <div class="badge badge-warning badge-sm">ORG</div>
                </div>
                <div class="flex items-center gap-1">
                    <a href="{% url 'inicio' %}" class="btn btn-ghost btn-xs">Ver web</a>
                    <button onclick="toggleTheme()" class="btn btn-ghost btn-xs btn-square" aria-label="Cambiar tema">
                        <svg id="icon-sun-org" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <svg id="icon-moon-org" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                    <a href="{% url 'org_logout' %}" class="btn btn-ghost btn-xs">Salir</a>
                </div>
            </div>
            <div class="tabs tabs-boxed bg-base-200 mt-2 p-1">
                <a href="{% url 'org_dashboard' %}" class="tab {% if active_tab == 'dashboard' %}tab-active{% endif %}">Dashboard</a>
                <a href="{% url 'org_parejas' %}" class="tab {% if active_tab == 'parejas' %}tab-active{% endif %}">Parejas</a>
                <a href="{% url 'org_grupos' %}" class="tab {% if active_tab == 'grupos' %}tab-active{% endif %}">Grupos</a>
                <a href="{% url 'org_metricas' %}" class="tab {% if active_tab == 'metricas' %}tab-active{% endif %}">Metricas</a>
                <a href="{% url 'org_partidas_libres' %}" class="tab {% if active_tab == 'libres' %}tab-active{% endif %}">Libres</a>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6 pb-20">
        {% block content %}{% endblock %}
    </main>

    <script>
        function updateIcons() {
            var theme = document.documentElement.getAttribute('data-theme');
            document.getElementById('icon-sun-org').classList.toggle('hidden', theme !== 'forest');
            document.getElementById('icon-moon-org').classList.toggle('hidden', theme !== 'lemonade');
        }
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'forest' ? 'lemonade' : 'forest';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('musdial-theme', next);
            updateIcons();
        }
        updateIcons();
    </script>
</body>
</html>
